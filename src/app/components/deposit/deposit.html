<section class="form-card">
  <h2>Deposit</h2>

  <div *ngIf="accountId === null" class="info-box">
    <p>Please select an account first on the login page.</p>
  </div>

  <div *ngIf="accountId !== null" class="info-box">
    <p><strong>Selected account:</strong> {{ accountId }}</p>
  </div>

  <form (ngSubmit)="onSubmit()" *ngIf="accountId !== null">
    <div class="field-row">
      <label for="amount">Amount:</label>
      <input type="number" id="amount" [(ngModel)]="amount" name="amount" step="0.01" min="0.01" required>
    </div>

    <div class="field-row">
      <label for="description">Description:</label>
      <input type="text" id="description" [(ngModel)]="description" name="description" required>
    </div>

    <div class="button-row">
      <button type="submit" [disabled]="loading">{{ loading ? 'Depositing...' : 'Deposit' }}</button>
    </div>
  </form>

  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="success" class="success">
    <p>Deposit successful!</p>
    <p>Transaction ID: {{ success.id }}</p>
    <p>Amount: {{ success.amount | number:'1.2-2' }}</p>
    <p>Balance After: {{ success.balance_after | number:'1.2-2' }}</p>
  </div>
</section>
