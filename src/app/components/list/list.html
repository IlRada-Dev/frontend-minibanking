<section class="table-card">
  <div class="section-header">
    <h2>Accounts</h2>
    <p class="hero-subtitle">Review the available accounts before selecting the one to manage.</p>
  </div>

  <div *ngIf="loading" class="info-box">Loading accounts...</div>

  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && !error">
    <table *ngIf="accounts.length > 0; else noAccounts">
      <thead>
        <tr>
          <th>ID</th>
          <th>Tax ID</th>
          <th>Owner Name</th>
          <th>Currency</th>
          <th>Created At</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let account of accounts">
          <td>{{ account.id }}</td>
          <td>{{ account.tax_id }}</td>
          <td>{{ account.owner_name }}</td>
          <td>{{ account.currency }}</td>
          <td>{{ account.created_at }}</td>
        </tr>
      </tbody>
    </table>

    <ng-template #noAccounts>
      <div class="info-box">
        <p>No accounts found.</p>
      </div>
    </ng-template>
  </div>
</section>
